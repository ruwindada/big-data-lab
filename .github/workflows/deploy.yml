# .github/workflows/deploy.yml
name: Deploy Big Data Lab Infrastructure

on:
  push:
    branches:
      - dev
      - main
    paths:
      - '**.tf'
      - '**.tfvars'
      - 'data/**'
      - 'scripts/**'
  pull_request:
    branches:
      - main
    paths:
      - '**.tf'
  workflow_dispatch:
    inputs:
      action:
        description: 'Select action to perform'
        type: choice
        options:
          - full-pipeline
          - validate-only
          - plan-only
          - apply-only
          - deploy-pipeline-only
          - destroy
        default: 'full-pipeline'
      environment:
        description: 'Environment'
        type: choice
        options:
          - dev
          - main
        default: 'dev'

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: '1.7.0'
  AWS_REGION: 'eu-central-1'

jobs:
  # ============================================
  # STAGE 1: VALIDATE (Self-contained)
  # ============================================
  validate:
    name: 🔍 Validate
    runs-on: ubuntu-latest
    if: |
      always() &&
      (github.event_name == 'push' ||
       github.event_name == 'pull_request' ||
       github.event.inputs.action == 'full-pipeline' ||
       github.event.inputs.action == 'validate-only' ||
       github.event.inputs.action == 'plan-only' ||
       github.event.inputs.action == 'apply-only' ||
       github.event.inputs.action == 'deploy-pipeline-only')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create terraform.tfvars
        run: |
          cat > terraform.tfvars << EOF
          aws_region                = "${{ env.AWS_REGION }}"
          environment               = "${{ github.event.inputs.environment || github.ref_name }}"
          owner                     = "github-actions"
          cost_center               = "big-data-lab"
          redshift_admin_password   = "${{ secrets.REDSHIFT_PASSWORD }}"
          redshift_base_capacity    = 8
          glue_worker_type          = "G.1X"
          glue_number_of_workers    = 2
          glue_timeout_minutes      = 20
          force_destroy_bucket      = true
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Format Check
        run: terraform fmt -check -diff || echo "⚠️ Run 'terraform fmt' to fix formatting"

      - name: Validate Summary
        run: |
          echo "## 🔍 Validation Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Terraform validation passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Format check completed" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # STAGE 2: PLAN (Self-contained)
  # ============================================
  plan:
    name: 📋 Plan
    runs-on: ubuntu-latest
    needs: validate
    if: |
      always() &&
      (github.event_name == 'push' ||
       github.event_name == 'pull_request' ||
       github.event.inputs.action == 'full-pipeline' ||
       github.event.inputs.action == 'plan-only' ||
       github.event.inputs.action == 'apply-only' ||
       github.event.inputs.action == 'deploy-pipeline-only')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create terraform.tfvars
        run: |
          cat > terraform.tfvars << EOF
          aws_region                = "${{ env.AWS_REGION }}"
          environment               = "${{ github.event.inputs.environment || github.ref_name }}"
          owner                     = "github-actions"
          cost_center               = "big-data-lab"
          redshift_admin_password   = "${{ secrets.REDSHIFT_PASSWORD }}"
          redshift_base_capacity    = 8
          glue_worker_type          = "G.1X"
          glue_number_of_workers    = 2
          glue_timeout_minutes      = 20
          force_destroy_bucket      = true
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -out=tfplan
          echo "exitcode=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          retention-days: 7

      - name: Plan Summary
        run: |
          echo "## 📋 Terraform Plan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Plan generated successfully" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # STAGE 3: APPLY (Self-contained)
  # ============================================
  apply:
    name: 🚀 Apply
    runs-on: ubuntu-latest
    needs: plan
    if: |
      (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main') &&
      (github.event_name == 'push' ||
       github.event.inputs.action == 'full-pipeline' ||
       github.event.inputs.action == 'apply-only' ||
       github.event.inputs.action == 'deploy-pipeline-only')
    environment:
      name: ${{ github.event.inputs.environment || github.ref_name }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create terraform.tfvars
        run: |
          cat > terraform.tfvars << EOF
          aws_region                = "${{ env.AWS_REGION }}"
          environment               = "${{ github.event.inputs.environment || github.ref_name }}"
          owner                     = "github-actions"
          cost_center               = "big-data-lab"
          redshift_admin_password   = "${{ secrets.REDSHIFT_PASSWORD }}"
          redshift_base_capacity    = 8
          glue_worker_type          = "G.1X"
          glue_number_of_workers    = 2
          glue_timeout_minutes      = 20
          force_destroy_bucket      = true
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve tfplan

      - name: Get Terraform Outputs
        id: terraform_output
        run: |
          echo "s3_bucket=$(terraform output -raw s3_bucket 2>/dev/null || echo 'N/A')" >> $GITHUB_OUTPUT
          echo "glue_database=$(terraform output -raw glue_database 2>/dev/null || echo 'N/A')" >> $GITHUB_OUTPUT
          echo "glue_crawler=$(terraform output -raw glue_crawler_name 2>/dev/null || echo 'N/A')" >> $GITHUB_OUTPUT
          echo "glue_job=$(terraform output -raw glue_job_name 2>/dev/null || echo 'N/A')" >> $GITHUB_OUTPUT
          echo "redshift_endpoint=$(terraform output -raw redshift_endpoint 2>/dev/null || echo 'N/A')" >> $GITHUB_OUTPUT

      - name: Apply Summary
        run: |
          echo "## 🚀 Terraform Apply Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| S3 Bucket | \`${{ steps.terraform_output.outputs.s3_bucket }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Glue Database | \`${{ steps.terraform_output.outputs.glue_database }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Glue Crawler | \`${{ steps.terraform_output.outputs.glue_crawler }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Glue Job | \`${{ steps.terraform_output.outputs.glue_job }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Redshift Endpoint | \`${{ steps.terraform_output.outputs.redshift_endpoint }}\` |" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # STAGE 4: DEPLOY DATA PIPELINE
  # ============================================
  deploy_pipeline:
    name: 🔄 Deploy Pipeline
    runs-on: ubuntu-latest
    needs: apply
    if: |
      (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main') &&
      (github.event_name == 'push' ||
       github.event.inputs.action == 'full-pipeline' ||
       github.event.inputs.action == 'deploy-pipeline-only')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Get Terraform Outputs
        id: outputs
        run: |
          echo "s3_bucket=$(terraform output -raw s3_bucket 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "glue_crawler=$(terraform output -raw glue_crawler_name 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "glue_job=$(terraform output -raw glue_job_name 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "glue_database=$(terraform output -raw glue_database 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

      - name: Update Glue Scripts in S3
        if: steps.outputs.outputs.s3_bucket != ''
        run: |
          BUCKET="${{ steps.outputs.outputs.s3_bucket }}"
          aws s3 cp scripts/transform.py s3://$BUCKET/scripts/transform.py
          echo "✅ Glue script uploaded to S3"

      - name: Run Glue Crawler
        if: steps.outputs.outputs.glue_crawler != ''
        run: |
          CRAWLER="${{ steps.outputs.outputs.glue_crawler }}"
          aws glue start-crawler --name $CRAWLER
          echo "✅ Crawler started: $CRAWLER"

          for i in {1..30}; do
            STATE=$(aws glue get-crawler --name $CRAWLER --query 'Crawler.State' --output text 2>/dev/null || echo "UNKNOWN")
            echo "Crawler state: $STATE"
            if [[ "$STATE" == "READY" ]]; then
              break
            fi
            sleep 10
          done

      - name: Run Glue ETL Job
        if: steps.outputs.outputs.glue_job != ''
        run: |
          JOB="${{ steps.outputs.outputs.glue_job }}"
          RUN_ID=$(aws glue start-job-run --job-name $JOB --query 'JobRunId' --output text)
          echo "🚀 Job started: $JOB (Run ID: $RUN_ID)"

          for i in {1..60}; do
            STATUS=$(aws glue get-job-run --job-name $JOB --run-id $RUN_ID --query 'JobRun.JobRunState' --output text 2>/dev/null || echo "UNKNOWN")
            echo "Job status: $STATUS"
            if [[ "$STATUS" == "SUCCEEDED" ]]; then
              echo "✅ Job completed successfully"
              break
            elif [[ "$STATUS" == "FAILED" || "$STATUS" == "STOPPED" ]]; then
              echo "❌ Job failed with status: $STATUS"
              exit 1
            fi
            sleep 30
          done

      - name: Pipeline Summary
        run: |
          echo "## 🔄 Data Pipeline Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Data pipeline deployed successfully!" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # STAGE 5: DESTROY
  # ============================================
  destroy:
    name: 💀 Destroy
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'destroy'
    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create terraform.tfvars
        run: |
          cat > terraform.tfvars << EOF
          aws_region                = "${{ env.AWS_REGION }}"
          environment               = "${{ github.event.inputs.environment || 'dev' }}"
          owner                     = "github-actions"
          cost_center               = "big-data-lab"
          redshift_admin_password   = "${{ secrets.REDSHIFT_PASSWORD }}"
          redshift_base_capacity    = 8
          glue_worker_type          = "G.1X"
          glue_number_of_workers    = 2
          glue_timeout_minutes      = 20
          force_destroy_bucket      = true
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve

      - name: Destroy Summary
        run: |
          echo "## 💀 Terraform Destroy Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All resources have been destroyed." >> $GITHUB_STEP_SUMMARY