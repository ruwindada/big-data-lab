# .github/workflows/deploy.yml
name: Deploy Big Data Lab Infrastructure

on:
  push:
    branches:
      - dev
      - main
    paths:
      - '**.tf'
      - '**.tfvars'
      - 'data/**'
      - 'scripts/**'
  pull_request:
    branches:
      - main
    paths:
      - '**.tf'
  workflow_dispatch:
    inputs:
      action:
        description: 'Select action to perform'
        type: choice
        options:
          - full-pipeline
          - validate-only
          - plan-only
          - apply-only
          - deploy-pipeline-only
          - destroy
        default: 'full-pipeline'
      environment:
        description: 'Environment'
        type: choice
        options:
          - dev
          - staging
          - prod
        default: 'dev'

permissions:
  contents: read
  pull-requests: write
  security-events: write

env:
  TF_VERSION: '1.7.0'
  AWS_REGION: 'eu-west-1'

jobs:
  # ============================================
  # STAGE 0: SECURITY SCANNING (Shift Left)
  # ============================================
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. Scan GitHub Actions Workflow
      - name: Scan GitHub Actions Workflow
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-pr-review
          level: warning

      # 2. Scan for Secrets (Gitleaks)
      - name: Scan for Secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: free

      # 3. Install Checkov
      - name: Install Checkov
        run: pip install checkov

      # 4. Scan Terraform with Checkov
      - name: Scan Terraform for Misconfigurations
        run: |
          checkov --directory . --framework terraform \
            --quiet \
            --output sarif \
            --output-file-path ./checkov-results.sarif
          # Move SARIF file if it was created elsewhere
          mv checkov-results.sarif checkov-results.sarif || true

      # 5. Upload Security Scan Results
      - name: Upload Security Scan Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
          category: checkov

      # 6. Install Trivy
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.49.0

      # 7. Scan Dependencies
      - name: Scan Dependencies for Vulnerabilities
        run: trivy fs --severity HIGH,CRITICAL --no-progress .

      # 8. Check Terraform Format
      - name: Check Terraform Format
        run: terraform fmt -check -diff -recursive

      # 9. Fail on Critical/High Issues
      - name: Fail if Critical/High Issues Found
        run: |
          if [ -f checkov-results.sarif ]; then
            CRITICAL_COUNT=$(grep -c '"severity": "critical"' checkov-results.sarif || echo "0")
            HIGH_COUNT=$(grep -c '"severity": "high"' checkov-results.sarif || echo "0")
            echo "Critical issues: $CRITICAL_COUNT"
            echo "High issues: $HIGH_COUNT"
            if [ "$CRITICAL_COUNT" -gt 0 ] || [ "$HIGH_COUNT" -gt 0 ]; then
              echo "❌ Critical/High issues found. Pipeline will block."
              exit 1
            fi
          fi

  # ============================================
  # STAGE 1: VALIDATE
  # ============================================
  validate:
    name: 🔍 Validate
    runs-on: ubuntu-latest
    needs: security-scan
    if: needs.security-scan.result == 'success'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create terraform.tfvars
        run: |
          cat > terraform.tfvars << EOF
          aws_region                = "${{ env.AWS_REGION }}"
          environment               = "${{ github.event.inputs.environment || github.ref_name }}"
          owner                     = "github-actions"
          cost_center               = "big-data-lab"
          redshift_admin_password   = "${{ secrets.REDSHIFT_PASSWORD }}"
          redshift_base_capacity    = 8
          glue_worker_type          = "G.1X"
          glue_number_of_workers    = 2
          glue_timeout_minutes      = 20
          force_destroy_bucket      = true
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

  # ============================================
  # STAGE 2: PLAN
  # ============================================
  plan:
    name: 📋 Plan
    runs-on: ubuntu-latest
    needs: validate
    if: |
      always() &&
      (github.event_name == 'push' ||
       github.event_name == 'pull_request' ||
       github.event.inputs.action == 'full-pipeline' ||
       github.event.inputs.action == 'plan-only' ||
       github.event.inputs.action == 'apply-only' ||
       github.event.inputs.action == 'deploy-pipeline-only')
    outputs:
      plan_exit_code: ${{ steps.plan.outputs.exitcode }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create terraform.tfvars
        run: |
          cat > terraform.tfvars << EOF
          aws_region                = "${{ env.AWS_REGION }}"
          environment               = "${{ github.event.inputs.environment || github.ref_name }}"
          owner                     = "github-actions"
          cost_center               = "big-data-lab"
          redshift_admin_password   = "${{ secrets.REDSHIFT_PASSWORD }}"
          redshift_base_capacity    = 8
          glue_worker_type          = "G.1X"
          glue_number_of_workers    = 2
          glue_timeout_minutes      = 20
          force_destroy_bucket      = true
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -out=tfplan
          echo "exitcode=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          retention-days: 7

      - name: Plan Summary
        run: |
          echo "## 📋 Terraform Plan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Plan generated successfully" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # STAGE 3: APPLY
  # ============================================
  apply:
    name: 🚀 Apply
    runs-on: ubuntu-latest
    needs: plan
    if: |
      (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main') &&
      (github.event_name == 'push' ||
       github.event.inputs.action == 'full-pipeline' ||
       github.event.inputs.action == 'apply-only' ||
       github.event.inputs.action == 'deploy-pipeline-only')
    environment:
      name: ${{ github.event.inputs.environment || github.ref_name }}
    concurrency:
      group: terraform-${{ github.ref_name }}
      cancel-in-progress: false
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create terraform.tfvars
        run: |
          cat > terraform.tfvars << EOF
          aws_region                = "${{ env.AWS_REGION }}"
          environment               = "${{ github.event.inputs.environment || github.ref_name }}"
          owner                     = "github-actions"
          cost_center               = "big-data-lab"
          redshift_admin_password   = "${{ secrets.REDSHIFT_PASSWORD }}"
          redshift_base_capacity    = 8
          glue_worker_type          = "G.1X"
          glue_number_of_workers    = 2
          glue_timeout_minutes      = 20
          force_destroy_bucket      = true
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve tfplan

      - name: Get Terraform Outputs
        id: terraform_output
        run: |
          S3_BUCKET=$(terraform output -raw s3_bucket 2>/dev/null || echo "")
          GLUE_DATABASE=$(terraform output -raw glue_database 2>/dev/null || echo "")
          GLUE_CRAWLER=$(terraform output -raw glue_crawler_name 2>/dev/null || echo "")
          GLUE_JOB=$(terraform output -raw glue_job_name 2>/dev/null || echo "")
          CONSOLE_URL="https://console.aws.amazon.com/s3/buckets/${S3_BUCKET}"

          echo "s3_bucket=${S3_BUCKET}" >> $GITHUB_OUTPUT
          echo "glue_database=${GLUE_DATABASE}" >> $GITHUB_OUTPUT
          echo "glue_crawler=${GLUE_CRAWLER}" >> $GITHUB_OUTPUT
          echo "glue_job=${GLUE_JOB}" >> $GITHUB_OUTPUT
          echo "console_url=${CONSOLE_URL}" >> $GITHUB_OUTPUT

      - name: Apply Summary
        run: |
          echo "## 🚀 Terraform Apply Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| S3 Bucket | \`${{ steps.terraform_output.outputs.s3_bucket || 'N/A' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Glue Database | \`${{ steps.terraform_output.outputs.glue_database || 'N/A' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Glue Crawler | \`${{ steps.terraform_output.outputs.glue_crawler || 'N/A' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Glue Job | \`${{ steps.terraform_output.outputs.glue_job || 'N/A' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Console URL | [Open AWS Console](${{ steps.terraform_output.outputs.console_url || '#' }}) |" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # STAGE 4: DEPLOY DATA PIPELINE
  # ============================================
  deploy_pipeline:
    name: 🔄 Deploy Pipeline
    runs-on: ubuntu-latest
    needs: apply
    if: |
      (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main') &&
      (github.event_name == 'push' ||
       github.event.inputs.action == 'full-pipeline' ||
       github.event.inputs.action == 'deploy-pipeline-only')
    concurrency:
      group: data-pipeline-${{ github.ref_name }}
      cancel-in-progress: false
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create terraform.tfvars
        run: |
          cat > terraform.tfvars << EOF
          aws_region                = "${{ env.AWS_REGION }}"
          environment               = "${{ github.event.inputs.environment || github.ref_name }}"
          owner                     = "github-actions"
          cost_center               = "big-data-lab"
          redshift_admin_password   = "${{ secrets.REDSHIFT_PASSWORD }}"
          redshift_base_capacity    = 8
          glue_worker_type          = "G.1X"
          glue_number_of_workers    = 2
          glue_timeout_minutes      = 20
          force_destroy_bucket      = true
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Get Terraform Outputs
        id: outputs
        run: |
          S3_BUCKET=$(terraform output -raw s3_bucket 2>/dev/null || echo "")
          GLUE_CRAWLER=$(terraform output -raw glue_crawler_name 2>/dev/null || echo "")
          GLUE_JOB=$(terraform output -raw glue_job_name 2>/dev/null || echo "")
          GLUE_DATABASE=$(terraform output -raw glue_database 2>/dev/null || echo "")

          echo "s3_bucket=${S3_BUCKET}" >> $GITHUB_OUTPUT
          echo "glue_crawler=${GLUE_CRAWLER}" >> $GITHUB_OUTPUT
          echo "glue_job=${GLUE_JOB}" >> $GITHUB_OUTPUT
          echo "glue_database=${GLUE_DATABASE}" >> $GITHUB_OUTPUT

      - name: Update Glue Scripts
        if: steps.outputs.outputs.s3_bucket != ''
        run: |
          BUCKET="${{ steps.outputs.outputs.s3_bucket }}"
          aws s3 cp scripts/transform.py s3://$BUCKET/scripts/transform.py
          echo "✅ Glue script uploaded to S3"

      - name: Run Glue Crawler
        if: steps.outputs.outputs.glue_crawler != ''
        run: |
          CRAWLER="${{ steps.outputs.outputs.glue_crawler }}"
          aws glue start-crawler --name $CRAWLER
          echo "✅ Crawler started: $CRAWLER"

          for i in {1..30}; do
            STATE=$(aws glue get-crawler --name $CRAWLER --query 'Crawler.State' --output text 2>/dev/null || echo "UNKNOWN")
            echo "Crawler state: $STATE"
            if [[ "$STATE" == "READY" ]]; then
              break
            fi
            sleep 10
          done

      - name: Run Glue ETL Job
        if: steps.outputs.outputs.glue_job != ''
        run: |
          JOB="${{ steps.outputs.outputs.glue_job }}"
          RUN_ID=$(aws glue start-job-run --job-name $JOB --query 'JobRunId' --output text)
          echo "🚀 Job started: $JOB (Run ID: $RUN_ID)"

          for i in {1..60}; do
            STATUS=$(aws glue get-job-run --job-name $JOB --run-id $RUN_ID --query 'JobRun.JobRunState' --output text 2>/dev/null || echo "UNKNOWN")
            echo "Job status: $STATUS"
            if [[ "$STATUS" == "SUCCEEDED" ]]; then
              echo "✅ Job completed successfully"
              break
            elif [[ "$STATUS" == "FAILED" || "$STATUS" == "STOPPED" ]]; then
              echo "❌ Job failed with status: $STATUS"
              exit 1
            fi
            sleep 30
          done

      - name: Run Athena Test Query
        if: steps.outputs.outputs.glue_database != ''
        run: |
          DATABASE="${{ steps.outputs.outputs.glue_database }}"
          BUCKET="${{ steps.outputs.outputs.s3_bucket }}"

          echo "🔍 Running test query on $DATABASE"
          QUERY_EXEC_ID=$(aws athena start-query-execution \
            --query-string "SELECT vehicle_brand, COUNT(*) FROM $DATABASE.raw GROUP BY vehicle_brand LIMIT 5" \
            --work-group ${BUCKET}-workgroup \
            --result-configuration "OutputLocation=s3://$BUCKET/athena-results/" \
            --query 'QueryExecutionId' --output text 2>/dev/null || echo "")

          if [ -n "$QUERY_EXEC_ID" ]; then
            echo "Query Execution ID: $QUERY_EXEC_ID"
            for i in {1..30}; do
              STATUS=$(aws athena get-query-execution --query-execution-id $QUERY_EXEC_ID --query 'QueryExecution.Status.State' --output text 2>/dev/null || echo "UNKNOWN")
              echo "Query status: $STATUS"
              if [[ "$STATUS" == "SUCCEEDED" ]]; then
                echo "✅ Athena query succeeded"
                break
              elif [[ "$STATUS" == "FAILED" ]]; then
                echo "❌ Athena query failed"
                break
              fi
              sleep 5
            done
          fi

      - name: Pipeline Summary
        run: |
          echo "## 🔄 Data Pipeline Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| S3 Script Upload | ✅ Completed |" >> $GITHUB_STEP_SUMMARY
          echo "| Glue Crawler | ✅ ${{ steps.outputs.outputs.glue_crawler || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Glue ETL Job | ✅ ${{ steps.outputs.outputs.glue_job || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Athena Query | ✅ Completed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Data pipeline deployed successfully!" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # STAGE 5: DESTROY (Manual Only)
  # ============================================
  destroy:
    name: 💀 Destroy
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'destroy'
    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create terraform.tfvars
        run: |
          cat > terraform.tfvars << EOF
          aws_region                = "${{ env.AWS_REGION }}"
          environment               = "${{ github.event.inputs.environment || 'dev' }}"
          owner                     = "github-actions"
          cost_center               = "big-data-lab"
          redshift_admin_password   = "${{ secrets.REDSHIFT_PASSWORD }}"
          redshift_base_capacity    = 8
          glue_worker_type          = "G.1X"
          glue_number_of_workers    = 2
          glue_timeout_minutes      = 20
          force_destroy_bucket      = true
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve

      - name: Destroy Summary
        run: |
          echo "## 💀 Terraform Destroy Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All resources have been destroyed." >> $GITHUB_STEP_SUMMARY
          